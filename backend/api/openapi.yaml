openapi: 3.0.3
info:
  title: Backend Bootstrap API
  version: 0.1.0
paths:
  /healthz:
    get:
      summary: Liveness check
      tags:
        - Health
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
              example:
                code: "OK"
                message: "success"
                data:
                  status: "ok"
                request_id: "req_123"
                trace_id: "trace_456"
  /readyz:
    get:
      summary: Readiness check
      tags:
        - Health
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
              example:
                code: "OK"
                message: "success"
                data:
                  status: "ok"
                request_id: "req_123"
                trace_id: "trace_456"
        '503':
          description: Dependency Unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
              example:
                code: "DEPENDENCY_UNAVAILABLE"
                message: "dependency unavailable"
                request_id: "req_123"
                trace_id: "trace_456"
  /api/v1/order/ping:
    get:
      summary: Order module ping
      tags:
        - Order
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
  /api/v1/payment/ping:
    get:
      summary: Payment module ping
      tags:
        - Payment
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
  /api/v1/inventory/ping:
    get:
      summary: Inventory module ping
      tags:
        - Inventory
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
  /api/v1/notification/ping:
    get:
      summary: Notification module ping
      tags:
        - Notification
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
  /api/v1/auth/login:
    post:
      summary: Login and create auth session
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: OK
          headers:
            Set-Cookie:
              description: Sets the refresh token cookie on successful login.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidCredentials:
                  value:
                    code: AUTH_INVALID_CREDENTIALS
                    message: 账号或密码错误
                    request_id: req_123
                    trace_id: trace_456
        '403':
          description: Account disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                accountDisabled:
                  value:
                    code: AUTH_ACCOUNT_DISABLED
                    message: 账号不可用
                    request_id: req_123
                    trace_id: trace_456
        '423':
          description: Account locked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                accountLocked:
                  value:
                    code: AUTH_ACCOUNT_LOCKED
                    message: 账号已锁定
                    request_id: req_123
                    trace_id: trace_456
  /api/v1/auth/refresh:
    post:
      summary: Rotate refresh token and issue a new access token
      tags:
        - Auth
      security:
        - refreshCookie: []
      description: 'Requires `credentials: include`. On success rotates the refresh token cookie. On invalid or reused refresh token clears the cookie.'
      responses:
        '200':
          description: OK
          headers:
            Set-Cookie:
              description: Rotates the refresh token cookie.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid or reused refresh token
          headers:
            Set-Cookie:
              description: Clears the refresh token cookie for `AUTH_REFRESH_INVALID` and `AUTH_REFRESH_REUSED`.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                refreshInvalid:
                  value:
                    code: AUTH_REFRESH_INVALID
                    message: 登录状态无效
                    request_id: req_123
                    trace_id: trace_456
                refreshReused:
                  value:
                    code: AUTH_REFRESH_REUSED
                    message: 登录状态无效
                    request_id: req_123
                    trace_id: trace_456
  /api/v1/auth/logout:
    post:
      summary: Revoke current refresh session and clear cookie
      tags:
        - Auth
      security:
        - refreshCookie: []
      description: Cookie-driven logout endpoint. Allows optional Bearer token for session context, but does not require it.
      responses:
        '200':
          description: OK
          headers:
            Set-Cookie:
              description: Clears the refresh token cookie.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
              example:
                code: OK
                message: success
                data:
                  success: true
                request_id: req_123
                trace_id: trace_456
  /api/v1/auth/me:
    get:
      summary: Return current access token identity snapshot
      tags:
        - Auth
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          description: Missing, invalid, or expired access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                tokenMissing:
                  value:
                    code: AUTH_TOKEN_MISSING
                    message: 未登录
                    request_id: req_123
                    trace_id: trace_456
                tokenInvalid:
                  value:
                    code: AUTH_TOKEN_INVALID
                    message: 登录状态无效
                    request_id: req_123
                    trace_id: trace_456
                tokenExpired:
                  value:
                    code: AUTH_TOKEN_EXPIRED
                    message: 登录状态已过期
                    request_id: req_123
                    trace_id: trace_456
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    refreshCookie:
      type: apiKey
      in: cookie
      name: refresh_token
  schemas:
    APIResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Business error code (e.g., "OK", "INVALID_PARAMS")
        message:
          type: string
          description: Safe error message or success message
        data:
          type: object
          description: Actual response payload
          nullable: true
        request_id:
          type: string
          description: Unique request identifier
        trace_id:
          type: string
          description: Distributed tracing identifier
    ErrorResponse:
      allOf:
        - $ref: '#/components/schemas/APIResponse'
      example:
        code: AUTH_TOKEN_INVALID
        message: 登录状态无效
        request_id: req_123
        trace_id: trace_456
    LoginRequest:
      type: object
      required:
        - identifier
        - password
      properties:
        identifier:
          type: string
          example: admin@example.com
        password:
          type: string
          format: password
          example: secret-password
    AuthUser:
      type: object
      required:
        - id
        - roles
      properties:
        id:
          type: string
          description: Public user identifier.
          example: usr_123
        roles:
          type: array
          items:
            type: string
          example:
            - admin
        permissions:
          type: array
          items:
            type: string
          example:
            - order:read
            - notification:send
    AuthResponseData:
      type: object
      required:
        - access_token
        - token_type
        - expires_in
        - user
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          format: int64
          example: 900
        user:
          $ref: '#/components/schemas/AuthUser'
    AuthResponse:
      allOf:
        - $ref: '#/components/schemas/APIResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/AuthResponseData'
      example:
        code: OK
        message: success
        data:
          access_token: jwt-access-token
          token_type: Bearer
          expires_in: 900
          user:
            id: usr_123
            roles:
              - admin
            permissions:
              - order:read
        request_id: req_123
        trace_id: trace_456
    MeResponseData:
      type: object
      required:
        - user
        - session_id
      properties:
        user:
          $ref: '#/components/schemas/AuthUser'
        session_id:
          type: string
          example: ses_123
    MeResponse:
      allOf:
        - $ref: '#/components/schemas/APIResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/MeResponseData'
      example:
        code: OK
        message: success
        data:
          user:
            id: usr_123
            roles:
              - admin
            permissions:
              - order:read
          session_id: ses_123
        request_id: req_123
        trace_id: trace_456

[build]
  bin = "tmp/main"
  cmd = "go build -o ./tmp/main ./cmd/api"
  full_bin = "APP_ENV=local ./tmp/main"
  include_ext = ["go", "tpl", "tmpl", "html"]
  exclude_dir = ["assets", "tmp", "vendor", "test/integration"]
  exclude_file = []
  exclude_regex = ["_test.go"]
  log = "air.log"

[log]
  time = false

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: backend
      POSTGRES_PASSWORD: backend
      POSTGRES_DB: Cgame
    ports:
      - "25432:5432"
    volumes:
      - backend-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U backend -d Cgame"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - backend-net

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "26379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - backend-net

  api:
    image: golang:1.26
    working_dir: /workspace
    command: go run ./cmd/api
    env_file:
      - .env
    environment:
      DB_DSN: postgres://backend:backend@postgres:5432/Cgame?sslmode=disable
      REDIS_ADDR: redis:6379
    volumes:
      - ./:/workspace
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend-net
    ports:
      - "8080:8080"

  worker:
    image: golang:1.26
    working_dir: /workspace
    command: go run ./cmd/worker
    env_file:
      - .env
    environment:
      DB_DSN: postgres://backend:backend@postgres:5432/Cgame?sslmode=disable
      REDIS_ADDR: redis:6379
    volumes:
      - ./:/workspace
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend-net

networks:
  backend-net:
    driver: bridge

volumes:
  backend-data:
  redis-data:

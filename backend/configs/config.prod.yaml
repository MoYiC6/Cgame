app:
  name: backend
  env: prod

server:
  addr: ":8081"

log:
  level: info

db:
  # 预留，初始化阶段不使用
  driver: postgres
  dsn: ""
  max_open_conns: 16
  max_idle_conns: 8
  conn_max_lifetime_secs: 300

auth:
  issuer: backend
  audience: admin-api
  access_token_ttl: 15m
  refresh_token_ttl: 168h
  login:
    max_failed_attempts: 5
    failed_window: 15m
    lock_duration: 30m
  password:
    min_length: 12
    max_length: 128
    argon2_memory_kib: 19456
    argon2_iterations: 2
    argon2_parallelism: 1
  cookie:
    enabled: true
    name: refresh_token
    domain: ""
    path: "/api/v1/auth"
    secure: true
    http_only: true
    same_site: lax
  jwt:
    algorithm: HS256
    key_id: prod-key

observability:
  trace_exporter_type: otlp
  trace_exporter_endpoint: "https://otel-collector:4318"
  service_name: backend
  service_version: "1.0.0"
  environment: prod

cors:
  allowed_origins:
    - "https://app.example.com"
  allowed_methods:
    - GET
    - POST
    - PUT
    - PATCH
    - DELETE
    - OPTIONS
  allowed_headers:
    - Authorization
    - Content-Type
    - X-Request-ID
    - X-Trace-ID
  allow_credentials: true
  max_age_secs: 600

security_headers:
  frame_options: "DENY"
  content_type_options: true
  referrer_policy: "strict-origin-when-cross-origin"

rate_limit:
  requests: 600
  window_secs: 60

metrics:
  enabled: true

redis:
  # 预留，初始化阶段不使用
  addr: ""

mq:
  # 预留，初始化阶段不使用
  driver: ""
  topic_prefix: backend.prod

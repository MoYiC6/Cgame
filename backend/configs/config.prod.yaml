app:
  name: backend
  env: prod

server:
  addr: ":8080"

log:
  level: info

db:
  # 预留，初始化阶段不使用
  driver: postgres
  dsn: ""
  max_open_conns: 16
  max_idle_conns: 8
  conn_max_lifetime_secs: 300

observability:
  trace_exporter_type: otlp
  trace_exporter_endpoint: "https://otel-collector:4318"
  service_name: backend
  service_version: "1.0.0"
  environment: prod

redis:
  # 预留，初始化阶段不使用
  addr: ""

mq:
  # 预留，初始化阶段不使用
  driver: ""
  topic_prefix: backend.prod

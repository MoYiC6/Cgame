app:
  name: backend-test
  env: test

server:
  addr: ":18080"

log:
  level: debug

db:
  # 预留，初始化阶段不使用
  driver: postgres
  dsn: "postgres://user:secret@localhost:5432/backend_test"
  max_open_conns: 16
  max_idle_conns: 8
  conn_max_lifetime_secs: 300

auth:
  issuer: backend
  audience: admin-api
  access_token_ttl: 15m
  refresh_token_ttl: 168h
  login:
    max_failed_attempts: 5
    failed_window: 15m
    lock_duration: 30m
  password:
    min_length: 12
    max_length: 128
    argon2_memory_kib: 19456
    argon2_iterations: 2
    argon2_parallelism: 1
  cookie:
    enabled: true
    name: refresh_token
    domain: ""
    path: "/api/v1/auth"
    secure: false
    http_only: true
    same_site: lax
  jwt:
    algorithm: HS256
    key_id: test-key

observability:
  trace_exporter_type: otlp
  trace_exporter_endpoint: "http://localhost:4318"
  service_name: backend-test
  service_version: "1.0.0"
  environment: test

cors:
  allowed_origins:
    - "https://frontend.example.com"
  allowed_methods:
    - GET
    - POST
    - OPTIONS
  allowed_headers:
    - Authorization
    - Content-Type
    - X-Request-ID
    - X-Trace-ID
  allow_credentials: true
  max_age_secs: 600

security_headers:
  frame_options: "DENY"
  content_type_options: true
  referrer_policy: "strict-origin-when-cross-origin"

rate_limit:
  requests: 120
  window_secs: 60

metrics:
  enabled: false

redis:
  # 预留，初始化阶段不使用
  addr: "127.0.0.1:6379"

mq:
  # 预留，初始化阶段不使用
  driver: in-memory
  topic_prefix: backend.test

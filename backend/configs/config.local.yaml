app:
  name: backend
  env: local

server:
  addr: ":8081"

log:
  level: info

db:
  driver: postgres
  dsn: "postgres://djclub:djclub_local_pass@localhost:15432/cgame?sslmode=disable"
  max_open_conns: 16
  max_idle_conns: 8
  conn_max_lifetime_secs: 300

auth:
  issuer: backend
  audience: admin-api
  access_token_ttl: 15m
  refresh_token_ttl: 168h
  login:
    max_failed_attempts: 5
    failed_window: 15m
    lock_duration: 30m
  password:
    min_length: 12
    max_length: 128
    argon2_memory_kib: 19456
    argon2_iterations: 2
    argon2_parallelism: 1
  cookie:
    enabled: true
    name: refresh_token
    domain: ""
    path: "/api/v1/auth"
    secure: false
    http_only: true
    same_site: lax
  jwt:
    algorithm: HS256
    key_id: local-dev-key

observability:
  trace_exporter_type: none
  trace_exporter_endpoint: ""
  service_name: backend
  service_version: "1.0.0"
  environment: local

cors:
  allowed_origins:
    - "http://localhost:3000"
    - "http://localhost:5173"
  allowed_methods:
    - GET
    - POST
    - PUT
    - PATCH
    - DELETE
    - OPTIONS
  allowed_headers:
    - Authorization
    - Content-Type
    - X-Request-ID
    - X-Trace-ID
  allow_credentials: true
  max_age_secs: 600

security_headers:
  frame_options: "SAMEORIGIN"
  content_type_options: true
  referrer_policy: "strict-origin-when-cross-origin"

rate_limit:
  requests: 120
  window_secs: 60

metrics:
  enabled: true

redis:
  addr: "localhost:26379"

mq:
  # 预留，初始化阶段不使用
  driver: ""
  topic_prefix: backend
